services:
  postgres_db:
    image: postgres:17-bookworm
    container_name: logmanager_postgres
    restart: unless-stopped
    ports:
    - "5432:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=logmanager_db
      - PGDATA=/var/lib/postgresql/data/pgdata

volumes:
  postgres_data: